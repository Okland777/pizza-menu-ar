<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Pizza AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin: 0; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">

    <div style="text-align: center;">
        <p>🍕 Готовим 3D модель...</p>
        <p style="font-size: 12px; color: #666;">Если ничего не происходит, откройте в Chrome или Safari</p>
    </div>

    <script>
        window.onload = () => {
            const isiPhone = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
            
            // ПРЯМЫЕ ССЫЛКИ (Проверьте, что в GitHub файлы называются именно так!)
            const glb = "https://okland777.github.io/pizza-menu-ar/pizza.glb";
            const usdz = "https://okland777.github.io/pizza-menu-ar/PIZZA.usdz";

            if (isiPhone) {
                window.location.replace(usdz);
            } else {
                window.location.replace(`intent://arvr.google.com/scene-viewer/1.0?file=${glb}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=https://okland777.github.io/pizza-menu-ar/;end;`);
            }
        };
    </script>
</body>
</html>
