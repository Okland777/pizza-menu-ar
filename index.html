<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body style="margin: 0; background: #000;">

    <model-viewer 
        src="pizza.glb" 
        ios-src="PIZZA.usdz"
        ar ar-modes="scene-viewer quick-look webxr" 
        camera-controls auto-rotate shadow-intensity="1"
        style="width: 100vw; height: 100vh;">
        
        <button slot="ar-button" style="background: white; border-radius: 30px; border: none; padding: 15px 35px; font-weight: bold; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 18px;">
            ПОСМОТРЕТЬ НА СТОЛЕ
        </button>
        
    </model-viewer>

</body>
</html>
