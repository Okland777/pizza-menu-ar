<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background: #000; color: white;">

    <div style="text-align: center;">
        <div style="border: 4px solid #333; border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <p>Загрузка аппетитной пиццы...</p>
    </div>

    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        window.onload = () => {
            const userAgent = navigator.userAgent.toLowerCase();
            const isiPhone = /iphone|ipad|ipod/.test(userAgent);
            
            // Ссылка на ваш репозиторий
            const repoUrl = "https://okland777.github.io/pizza-menu-ar/";

            if (isiPhone) {
                // Прямой запуск для iPhone (файл PIZZA заглавными, как на скриншоте)
                window.location.href = repoUrl + "PIZZA.usdz";
            } else {
                // Прямой запуск для Android (Google Scene Viewer)
                const modelUrl = repoUrl + "pizza.glb";
                const intent = `intent://arvr.google.com/scene-viewer/1.0?file=${modelUrl}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=https://developers.google.com/ar;end;`;
                window.location.href = intent;
            }
        };
    </script>
</body>
</html>
