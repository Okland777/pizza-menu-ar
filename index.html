<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Pizza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin: 0; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center;">

    <div>
        <p>🍕 <b>Почти готово!</b></p>
        <p>Если AR не открылось через 5 секунд,<br>нажмите на кнопку ниже:</p>
        <a id="ar-link" href="#" style="display: inline-block; padding: 15px 25px; background: white; color: black; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 20px;">ПОСМОТРЕТЬ ПИЦЦУ</a>
    </div>

    <script>
        window.onload = () => {
            const isiPhone = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
            
            // Пробуем определить текущий адрес автоматически
            const currentPath = window.location.href.split('index.html')[0];
            const baseUrl = currentPath.endsWith('/') ? currentPath : currentPath + '/';

            const glb = baseUrl + "pizza.glb";
            const usdz = baseUrl + "PIZZA.usdz";

            const arLink = document.getElementById('ar-link');

            if (isiPhone) {
                arLink.href = usdz;
                arLink.rel = "ar";
                window.location.replace(usdz);
            } else {
                const intent = `intent://arvr.google.com/scene-viewer/1.0?file=${glb}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=https://google.com;end;`;
                arLink.href = intent;
                window.location.replace(intent);
            }
        };
    </script>
</body>
</html>
