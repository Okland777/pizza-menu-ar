<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background: #000; color: white; text-align: center;">

    <div>
        <div id="loader" style="border: 4px solid #333; border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <p>Загрузка AR-модели...</p>
    </div>

    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        window.onload = () => {
            const isiPhone = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
            // Используем только маленькие буквы в адресе сайта
            const repoUrl = "https://okland777.github.io/pizza-menu-ar/";

            if (isiPhone) {
                // Файл на GitHub называется большими буквами PIZZA.usdz
                window.location.href = repoUrl + "PIZZA.usdz";
            } else {
                // Файл на GitHub называется маленькими буквами pizza.glb
                const modelUrl = repoUrl + "pizza.glb";
                window.location.href = `intent://arvr.google.com/scene-viewer/1.0?file=${modelUrl}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=https://developers.google.com/ar;end;`;
            }
        };
    </script>
</body>
</html>
